{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="manifest" href="{% static 'pwa/manifest.json' %}">
  <link rel="stylesheet" href="{% static 'pwa/styles.css' %}">
  <title>GlucoBridge Patient Directory</title>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>GlucoBridge Patient Directory</h1>
        <p>Search and browse patients via the secure API.</p>
      </div>
      <div id="userInfo" class="user-info"></div>
      <button id="logoutButton" hidden>Logout</button>
    </header>
    <div id="app" class="card">Loading...</div>
    <div class="footer">Built as a minimal PWA prototype for the GlucoBridge backend.</div>
  </div>
  <script src="{% static 'pwa/app.js' %}"></script>
</body>
</html>
